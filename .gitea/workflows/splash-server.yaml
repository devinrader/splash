name: Deploy Splash Server
run-name: Deploy Splash Server

on: 
  push:
    paths:
      - 'splash-server/**'
      - '.gitea/workflows/splash-server.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SERIAL_DEVICE_PATH: ${vars.SERIAL_DEVICE_PATH}
  SERVER_ADDRESS: http://splash.rader.haus

jobs:
  build_and_publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - uses: actions/checkout@v4

      - name: "Build Splash Server"
        run: |
          cd splash-server
          npm ci
          npm run build
          npm run lint
        # npm tun test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PATC }}
          # username: ${{ vars.DOCKERHUB_USERNAME }}
          # password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the splash-server Docker image
        run: |
          docker build . --no-cache --platform linux/arm/v7 --tag ghcr.io/devinrader/splash-server:latest -f splash-server/Dockerfile
          docker push ghcr.io/devinrader/splash-server:latest 
        # docker run ghcr.io/devinrader/splash:latest