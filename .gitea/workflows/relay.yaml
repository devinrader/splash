name: Deploy Splash Relay 
run-name: Deploy Splash Relay
on: 
  push:
    paths:
      - 'splash-relay/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: "Install & build"
        run: |
          cd splash-relay
          npm i
          npm run build
      - name: "Push to server"
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          #key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: "splash-relay/dist/"
          strip_components: 1
          target: "/home/devinrader/splash/splash-relay"
      - name: "Start server"
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          #key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: /home/devinrader/splash/splash-relay/deploy.sh

      # (optional - only needed if your config uses environment variables)
      # - name: Create env file
      #   run: |
      #     touch .env
      #     echo SPLASH_SERVER_ADDRESS=${{ secrets.SPLASH_SERVER_ADDRESS }} >> .env

      # - name: Install PM2
      #   run: npm i pm2 -g

