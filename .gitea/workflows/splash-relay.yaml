name: Deploy Splash Relay 
run-name: Deploy Splash Relay

on: 
  push:
    paths:
      - 'splash-relay/**'
      - '.gitea/workflows'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
      - uses: actions/setup-node@v3
        with:
          node-version: "20"
      - name: "Build Splash Relay"
      - run: cd splash-relay
      - run: npm ci
      #- run: npm run lint
      #- run: npm tun test
      - run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Log in to the Github Container registry
      - uses: docker/login-action@v3
          with:
            registry: ${{ env.REGISTRY }}
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
