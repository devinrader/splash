name: Deploy Splash Relay 
run-name: Deploy Splash Relay

on: 
  push:
    paths:
      - 'splash-relay/**'
      - '.gitea/workflows/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      #- run: npm run lint
      #- run: npm tun test
      - name: "Build Splash Relay"
        run: |
          cd splash-relay
          npm ci
          npm run build

  publish:
    #runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Debug Print secret
        run: echo $GITHUB_TOKEN|base64
      
      - name: Debug Print env
        run: env

      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}
          # username: ${{ vars.DOCKERHUB_USERNAME }}
          # password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the hello-docker Docker image
        run: |
          ls
          docker build . --no-cache --progress=plain --tag ghcr.io/devinrader/splash:latest -f splash-relay/Dockerfile
          docker push ghcr.io/devinrader/splash:latest 
