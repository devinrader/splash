name: Deploy Splash Relay 
run-name: Deploy Splash Relay

on: 
  push:
    paths:
      - 'splash-relay/**'
      - '.gitea/workflows/splash-relay.yaml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      
      - name: "Build Splash Relay"
        run: |
          cd splash-relay
          npm ci
          npm run build
          npm run lint
      # npm tun test
  publish:
    #runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Github Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PATC }}
          # username: ${{ vars.DOCKERHUB_USERNAME }}
          # password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build the hello-docker Docker image
        run: |
          docker build . --platform linux/arm/v7 --tag ghcr.io/devinrader/splash-relay:latest -f splash-relay/Dockerfile
          docker push ghcr.io/devinrader/splash-relay:latest 
        # docker run ghcr.io/devinrader/splash:latest