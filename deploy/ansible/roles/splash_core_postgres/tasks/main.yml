---
- name: Install Docker runtime packages
  ansible.builtin.apt:
    name: "{{ splash_postgres_apt_packages }}"
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and started
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Ensure splash-core PostgreSQL project directory exists
  ansible.builtin.file:
    path: "{{ splash_postgres_compose_project_dir }}"
    state: directory
    mode: "0755"

- name: Ensure splash-core PostgreSQL data directory exists
  ansible.builtin.file:
    path: "{{ splash_postgres_data_dir }}"
    state: directory
    owner: "999"
    group: "999"
    mode: "0750"

- name: Validate splash-core PostgreSQL password is configured
  ansible.builtin.assert:
    that:
      - splash_postgres_password | length > 0
    fail_msg: "Set splash_postgres_password in group_vars/splash_core/vault.yml before deployment."

- name: Render splash-core PostgreSQL env file
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ splash_postgres_compose_project_dir }}/postgres.env"
    mode: "0600"

- name: Render splash-core PostgreSQL Compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ splash_postgres_compose_project_dir }}/compose.yml"
    mode: "0644"

- name: Start splash-core PostgreSQL stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ splash_postgres_compose_project_dir }}"
  changed_when: true
