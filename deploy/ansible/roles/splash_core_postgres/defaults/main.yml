---
splash_postgres_compose_project_dir: /opt/splash-core/postgres
splash_postgres_data_dir: /var/lib/splash-postgres

splash_postgres_image: postgres
splash_postgres_image_tag: "16-bookworm"

splash_postgres_db: splash
splash_postgres_user: splash
splash_postgres_password: ""
splash_postgres_port: 5432
splash_postgres_bind_address: 127.0.0.1

splash_postgres_container_name: splash-postgres
splash_postgres_restart_policy: unless-stopped

splash_postgres_env:
  TZ: America/New_York
  PGDATA: /var/lib/postgresql/data/pgdata

splash_postgres_apt_packages:
  - docker.io
  - docker-compose-plugin
